name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - '**.dart'
      - 'pubspec.yaml'
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build APK (Android 13+, API 33)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.3'

      # Si le dossier android n'existe pas ou est corrompu, on le régénère
      - name: Regenerate Android folder (clean)
        run: |
          rm -rf android/
          flutter create --platforms=android --project-name okitakoy_mail --org corp.okitakoy .

      - name: Patch Android config (minSdk 33, label, permissions, OAuth callback)
        run: bash scripts/patch_android.sh

      # Force l'embedding v2 dans gradle.properties (précaution)
      - name: Force embedding v2
        run: echo "flutter_embedding_v2=true" >> android/gradle.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons || true

      - name: Build release APK (unsigned)
        env:
          GITHUB_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
        run: |
          flutter build apk --release \
            --dart-define=GITHUB_CLIENT_ID="${GITHUB_CLIENT_ID}" \
            --dart-define=GITHUB_CLIENT_SECRET="${GITHUB_CLIENT_SECRET}"

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Sign APK
        run: |
          jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 \
            -keystore keystore.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            build/app/outputs/flutter-apk/app-release.apk \
            "${{ secrets.KEY_ALIAS }}"

      - name: Verify signature
        run: jarsigner -verify -verbose -certs build/app/outputs/flutter-apk/app-release.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: okitakoy-mail-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error