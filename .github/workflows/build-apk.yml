name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'flutter_app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build APK (Android 13+, API 33)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.3'

      - name: Generate Android scaffolding
        run: flutter create --platforms=android --project-name okitakoy_mail --org corp.okitakoy .

      - name: Patch Android config
        run: bash scripts/patch_android.sh

      - name: Get dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons || true

      - name: Build release APK (unsigned)
        env:
          GITHUB_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
        run: |
          flutter build apk --release \
            --dart-define=GITHUB_CLIENT_ID="${GITHUB_CLIENT_ID}" \
            --dart-define=GITHUB_CLIENT_SECRET="${GITHUB_CLIENT_SECRET}"

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Sign APK
        run: |
          jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 \
            -keystore keystore.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            build/app/outputs/flutter-apk/app-release.apk \
            "${{ secrets.KEY_ALIAS }}"

      - name: Verify signature
        run: jarsigner -verify -verbose -certs build/app/outputs/flutter-apk/app-release.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: okitakoy-mail-release-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error