name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build signed APK (Android 13+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.3'

      - name: Regenerate Android folder (clean)
        run: |
          rm -rf android/
          flutter create --platforms=android --project-name okitakoy_mail --org corp.okitakoy .

      - name: Patch Android config
        run: bash scripts/patch_android.sh

      - name: Force embedding v2
        run: echo "flutter_embedding_v2=true" >> android/gradle.properties

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks

      - name: Generate launcher icons
        run: |
          flutter pub get
          dart run flutter_launcher_icons

      - name: Build signed APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          GITHUB_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
        run: |
          flutter build apk --release \
            --dart-define=GITHUB_CLIENT_ID="${GITHUB_CLIENT_ID}" \
            --dart-define=GITHUB_CLIENT_SECRET="${GITHUB_CLIENT_SECRET}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: okitakoy-mail-signed.apk
          path: build/app/outputs/flutter-apk/app-release.apk
