<!DOCTYPE html>
<html>
<head>
    <title>Okitakoy Mail - Redirection</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 2rem; }
        .btn { background: #0EA5E9; color: white; padding: 12px 24px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 20px; }
    </style>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        if (code) {
            // Tentative automatique après 0.3s
            setTimeout(function() {
                window.location.href = 'okitakoymail://callback?code=' + code;
            }, 300);
            // Afficher le bouton en cas d'échec
            document.addEventListener('DOMContentLoaded', function() {
                document.getElementById('openApp').style.display = 'inline-block';
            });
        } else {
            document.body.innerHTML = '<p>Erreur : aucun code reçu.</p>';
        }
    </script>
</head>
<body>
    <p>Authentification réussie !</p>
    <a class="btn" id="openApp" href="#" style="display:none;" onclick="window.location.href='okitakoymail://callback?code=' + new URLSearchParams(window.location.search).get('code'); return false;">Ouvrir l'application</a>
    <script>
        const link = document.getElementById('openApp');
        if (link && code) link.href = 'okitakoymail://callback?code=' + code;
    </script>
</body>
</html>
