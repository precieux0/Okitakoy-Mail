<!DOCTYPE html>
<html>
<head>
    <title>Redirection Okitakoy Mail</title>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        if (code) {
            window.location.href = 'okitakoymail://callback?code=' + code;
        } else {
            document.body.innerText = 'Erreur : aucun code reçu.';
        }
    </script>
</head>
<body>
    <p>Redirection en cours...</p>
</body>
</html>
